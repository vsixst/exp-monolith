- type: entity
  save: false
  name: Urisst' Mzhand
  parent: [ BaseMobSpeciesOrganic, ReptilianClaws ]
  id: BaseMobReptilian
  abstract: true
  components:
  - type: HumanoidAppearance
    species: Reptilian
    hideLayersOnEquip:
    - Snout
#    - HeadTop # WWDP - Because visible horns its cool
    - HeadSide
  - type: Hunger
  - type: Puller
    needsHands: false
  - type: Thirst
  - type: Icon
    sprite: Mobs/Species/Reptilian/parts.rsi
    state: full
  - type: Body
    prototype: Reptilian
    requiredLegs: 2
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatLizard
      amount: 5
  - type: LizardAccent
  - type: Speech
    speechSounds: Lizard
    speechVerb: Reptilian
    allowedEmotes: ['Thump']
  - type: TypingIndicator
    proto: lizard
  - type: Vocal
    sounds:
      Male: MaleReptilian
      Female: FemaleReptilian
      Unsexed: MaleReptilian
  - type: LanguageKnowledge # Einstein Engines - Languages
    speaks:
    - TauCetiBasic
    - Draconic
    understands:
    - TauCetiBasic
    - Draconic
  - type: BodyEmotes
    soundsId: ReptilianBodyEmotes
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Scale
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Blunt: 3 # Mono
    attackRate: 1.5
  - type: Temperature
    heatDamageThreshold: 400
    coldDamageThreshold: 285
    currentTemperature: 310.15
    specificHeat: 42
    coldDamage:
      types:
        Cold : 0.15 #per second, scales with temperature & other constants. # Mono 0.1 -> 0.15
    heatDamage:
      types:
        Heat : 1.5 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      298: 0.8 # Mono
      292: 0.6 # Mono
      285: 0.4 # Mono
  - type: Wagging
  - type: Inventory
    speciesId: reptilian
    # WWDP-Edit-Start
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: jumpsuit-female
      shoes:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: shoes
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: jumpsuit
      shoes:
        sizeMaps:
          32:
            sprite: _White/Mobs/Species/displacement.rsi
            state: shoes
    # WWDP-Edit-End
  - type: Tag # Mono/Goobstation
    tags:
    - ReptilianEmotes
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - Humanoid
  # Mono edit start
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 250 # weighs more than humans because tail.
        restitution: 0.0
        mask:
          - MobMask
        layer:
          - MobLayer
  - type: ThermalRegulator
    implicitHeatRegulation: 320
    metabolismHeat: 230
    radiatedHeat: 710
    shiveringHeatRegulation: 690
    updateInterval: 2
  - type: TemperatureStatusEffects
    temperatureEffects:
    - maximumTemperature: 295
      effects:
      - !type:Drunk
        boozePower: 1
    - maximumTemperature: 285
      effects:
      - !type:GenericStatusEffect
        key: Drowsiness
        component: Drowsiness
        time: 2
        type: Add
        refresh: true
    - minimumTemperature: 322
      effects:
      - !type:MovespeedModifier
        walkSpeedModifier: 1.10
        sprintSpeedModifier: 1.10
      - !type:EvenHealthChange
        damage:
          Burn: -1
          Brute: -1


  # Mono edit end

