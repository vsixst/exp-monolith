#region Other
- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckCloakTTIParamedic
  name: Плащ Парамедика TTI
  description: Уютный плащ для проведения спасательных операций. Точно не демаскирует вас кучей стробоскопов.
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: Forge/Clothing/Neck/Cloaks/paramed.rsi
    layers:
    - state: icon-off
    - state: icon-on
      color: "#a9b6bd"
      shader: unshaded
  - type: Clothing
    sprite: Forge/Clothing/Neck/Cloaks/paramed.rsi
    clothingVisuals:
      neck:
      - state: equipped-NECK-off
      - state: equipped-NECK-on
        color: "#a9b6bd"
        shader: unshaded
  - type: StaticPrice
    price: 200
    vendPrice: 6000

- type: entity
  parent: ClothingNeckBase
  id: PlumberDarkCloakVClose
  name: тёмный плащ
  description: Длинное, свободное одеяние цвета ночи, которое элегантно струится вокруг фигуры, добавляя образу таинственности и загадочности.
  components:
  - type: Sprite
    sprite: Forge/Clothing/Neck/Cloaks/darkcloakclose.rsi
  - type: Clothing
    sprite: Forge/Clothing/Neck/Cloaks/darkcloakclose.rsi
  - type: ToggleableClothing
    clothingPrototype: PlumberDarkHoodV
    requiredSlot:
    - neck
    slot: head
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:Container

- type: entity
  parent: ClothingNeckBase
  id: PlumberDarkCloakVOpen
  name: тёмный плащ
  description: Длинное, свободное одеяние цвета ночи, которое элегантно струится вокруг фигуры, добавляя образу таинственности и загадочности.
