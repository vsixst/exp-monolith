- type: entity
  parent: [ClothingHeadHardsuitBase, BaseToggleClothing, PowerCellSlotSmallItem, BaseC3Contraband]
  id: ClothingHeadHealmetContractorStealh
  name: шлем экзокостюма DCN™
  description: Прекрасно сидит на вашей голове фиксируя её положение
  components:
  - type: BreathMask
  - type: Sprite
    sprite: Forge/Clothing/Head/Hardsuits/contractor.rsi
  - type: Clothing
    sprite: Forge/Clothing/Head/Hardsuits/contractor.rsi
    equippedState: off-equipped-HELMET
