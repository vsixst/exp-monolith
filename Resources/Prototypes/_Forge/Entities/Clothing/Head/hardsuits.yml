- type: entity
  parent: [ ClothingHeadHelmetHardsuitMercenary, BaseC1Contraband ]
  id: ClothingHeadHelmetHardsuitAAMr
  name: AAM R-41 Spectre helmet
  description: AAM r-41 helmet desc
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Mono/Clothing/Head/Hardsuits/syndicate.rsi # textures from _Mono
  - type: Clothing
    sprite: _Mono/Clothing/Head/Hardsuits/syndicate.rsi # textures from _Mono
  - type: PointLight
    color: "#8FBC8F"

- type: entity
  parent: [ BaseC1Contraband, ClothingHeadHelmetDOC ]
  id: ClothingHeadHelmetHardsuitDOC
  name: DOC hardsuit helmet
  description: A special hardsuit helmet worn by Director of Care.
  components:
  - type: Sprite
    sprite: Forge/Clothing/Head/Hardsuits/DOC.rsi
  - type: Clothing
    sprite: Forge/Clothing/Head/Hardsuits/DOC.rsi
  - type: PointLight
    color: "#adffe1"

- type: entity
  parent: [ ClothingHeadSuitWithLightBase, ClothingHeadEVAHelmetBase ] #Despite acting like a hardsuit helmet, since it inherits from EVA Helmet, it goes here.
  id: ClothingHeadHelmetDOC
  name: paramedic void helmet
  description: A void helmet made for paramedics.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Forge/Clothing/Head/Hardsuits/paramedhelm.rsi #Corvax-Frontier-Resprite
  - type: HandheldLight
    addPrefix: false
  - type: ToggleableLightVisuals
    spriteLayer: light
    clothingVisuals:
      head:
      - state: equipped-head-light
      head-vox:
      - state: equipped-head-light-vox
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-head
      head-vox:
      - state: equipped-head-vox
  - type: TemperatureProtection
    heatingCoefficient: 0.1
    coolingCoefficient: 0.1
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.85
        Heat: 0.85
  - type: PointLight
    radius: 5
    energy: 2
    color: "#00ffff"

# region Empire
- type: entity
  parent: ClothingHeadHardsuitBase
  id: ClothingHeadHelmetHardsuitEmpire14m
  name: HVE-14m helmet
  description: The interchangeable helmet system for the majority of HVE-14m hardsuits.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Forge/Clothing/Head/Hardsuits/empirelight.rsi
  - type: Clothing
    sprite: Forge/Clothing/Head/Hardsuits/empirelight.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.08
    lowPressureMultiplier: 1000
  - type: NightVision
    flashDurationMultiplier: 3.5
    isEquipment: true
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.95
        Heat: 0.95
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
    - HeadTop
    - HeadSide

