- type: entity
  parent: ClothingHeadHealmetContractorStealh
  id: ClothingHeadHelmetHardsuitTSFStealthMark1
  name: TSF stealth suit helmet Mk.1
  description: A stealth TSF hardsuit helmet with active camouflage controls.
  components:
  - type: Sprite
    sprite: Forge/Clothing/Head/Hardsuits/tsf_stealth_mark1.rsi
  - type: Clothing
    sprite: Forge/Clothing/Head/Hardsuits/tsf_stealth_mark1.rsi
  - type: ToggleClothing
    action: ActionTogglePhaseCloak
    disableOnUnequip: true
  - type: ComponentToggler
    parent: true
    components:
    - type: Stealth
      minVisibility: 0.01
      lastVisibility: 0.01
  - type: UseDelay
    delay: 2
  - type: PowerCellDraw
    drawRate: 2
  - type: ToggleCellDraw

