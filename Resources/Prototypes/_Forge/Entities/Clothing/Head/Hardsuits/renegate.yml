- type: entity
  parent: ClothingHeadHardsuitBase
  id: ClothingHeadHelmetHardsuitRenegatebsii20
  name: BSII-20 "Requiem" helmet
  description: The interchangeable helmet system for the majority of BSII-20 hardsuits.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Forge/Clothing/Head/Hardsuits/renegatelight.rsi
  - type: Clothing
    sprite: Forge/Clothing/Head/Hardsuits/renegatelight.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.08
    lowPressureMultiplier: 1000
  - type: NightVision
    flashDurationMultiplier: 3.5
    isEquipment: true
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.95
        Heat: 0.95
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
    - HeadTop
    - HeadSide

