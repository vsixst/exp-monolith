#region Company
- type: entity
  parent: [ ClothingOuterBase ] # Mono
  id: ClothingModsuitChestplateVanguardNSC
  name: vanguard modsuit chestplate
  description: A well rounded modsuit that focuses on mobility with its Actuator Enhancement System allowing its wearer to leap across the battlefield for rapid redeployment.
  categories: [ HideSpawnMenu ]
  components:
  - type: Appearance
  - type: AllowSuitStorage
  - type: Sprite
    sprite: Forge/Clothing/OuterClothing/Modsuits/nexusmod.rsi
    layers:
    - state: chestplate
    - state: chestplate-sealed
      visible: false
      map: [ "sealed" ]
  - type: Clothing
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
    slots: [ outerClothing ]
  - type: SealableClothing
    sealUpPopup: sealable-clothing-seal-up-chestplate
    sealDownPopup: sealable-clothing-seal-down-chestplate
  - type: SealableClothingVisuals
    spriteLayer: sealed
    clothingVisuals:
      outerClothing:
      - state: equipped-OUTERCLOTHING-sealed
      outerClothing-vox:
      - state: equipped-OUTERCLOTHING-sealed-vox
      outerClothing-resomi:
      - state: equipped-OUTERCLOTHING-sealed-resomi
  - type: ExplosionResistance
    damageCoefficient: 0.50 # Mono
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.65
        Slash: 0.65
        Piercing: 0.50
        Heat: 0.50
        Radiation: 0.60 # Mono
  - type: ComponentToggler
    components:
    - type: PressureProtection
      highPressureMultiplier: 0.3
      lowPressureMultiplier: 1000
    - type: TemperatureProtection
      coolingCoefficient: 0.1
      heatingCoefficient: 0.4
  - type: StaminaDamageResistance
    coefficient: 0.7 # Mono
  - type: FireProtection
    reduction: 0.5 # Mono
