- type: entity
  parent: ClothingOuterHardsuitBase
  id: ClothingOuterHardsuitRenegatebsii20
  name: BSII-20 "Requiem" hardsuit
  suffix: Ренегаты
  description: A second-generation hardsuit. The first variation for mass production, and your model has already seen several battles and owners, which doesn't make it any worse.
  components:
  - type: Sprite
    sprite: Forge/Clothing/OuterClothing/Hardsuits/renegatelight.rsi
  - type: Item
    size: Huge
  - type: Clothing
    sprite: Forge/Clothing/OuterClothing/Hardsuits/renegatelight.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.05
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.65
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.7
        Slash: 0.7
        Piercing: 0.60
        Heat: 0.7
        Radiation: 0.65
        Caustic: 0.8
  - type: StaminaDamageResistance
    coefficient: 0.25
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.85
  - type: HeldSpeedModifier
  - type: ToggleableClothing # Goobstation - Modsuits change - Mono - this is a solution for helmet attachment/cover to not fit on hardsuits
    requiredSlot: outerclothing
    blockUnequipWhenAttached: false
    replaceCurrentClothing: true
    clothingPrototypes:
      head: ClothingHeadHelmetHardsuitRenegatebsii20
      helmetcover: ClothingHeadHelmetCoverBlock
      helmetattachment: ClothingHeadHelmetAttachmentBlock
  - type: StaticPrice
    price: 5000
    vendPrice: 7500

