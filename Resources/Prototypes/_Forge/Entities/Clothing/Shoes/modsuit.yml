- type: entity
  parent: ClothingShoesBase
  id: ClothingModsuitBootsVanguardNSC
  name: vanguard modsuit boots
  description: The suits Actuator Enhancement System paired with the built in magboots make boarding actions a breeze.
  categories: [ HideSpawnMenu ]
  components:
  - type: Appearance
  - type: Sprite
    sprite: Forge/Clothing/Shoes/Modsuits/nexusmod.rsi
    layers:
    - state: boots
    - state: boots-sealed
      map: [ "sealed" ]
  - type: Clothing
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
    slots: [ feet ]
  - type: Tag
    tags:
    - WhitelistChameleon
  - type: SealableClothing
    sealUpPopup: sealable-clothing-seal-up-boots
    sealDownPopup: sealable-clothing-seal-down-boots
  - type: ClothingSpeedModifier
    walkModifier: 0.9 # Mono
    sprintModifier: 0.9 # Mono
  - type: ClothingSlowOnDamageModifier
    modifier: 0.75
  - type: ItemToggle
    onUse: false
    onActivate: false
  - type: ToggleClothing
    action: ActionToggleMagboots
    mustEquip: false
  - type: ComponentToggler
    components:
    - type: NoSlip
  - type: Magboots
  - type: SealableClothingVisuals
    spriteLayer: sealed
    clothingVisuals:
      shoes:
      - state: equipped-FEET-sealed
      shoes-vox:
      - state: equipped-FEET-sealed-vox

