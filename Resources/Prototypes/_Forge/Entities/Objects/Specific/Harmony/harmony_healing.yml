- type: entity
  name: synthetic flesh pack
  description: synthetic-flesh-pack-desc
  parent: BaseHealingItem
  id: HMESynthFleshPack
  suffix: Full
  components:
  - type: Tag
    tags:
    - Ointment
  - type: Sprite
    sprite: Forge/Objects/Specific/Medical/harmonyhealing.rsi
    state: synthfleshpack
  - type: Item
    sprite: Forge/Objects/Specific/Medical/harmonyhealing.rsi
    heldPrefix: synthfleshpack
    storedRotation: -90
  - type: Healing
    damageContainers:
    - Biological
    damage:
      groups:
        Burn: -60
      types:
        Radiation: -3.5
    healingBeginSound:
      path: "/Audio/Items/Medical/ointment_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    healingEndSound:
      path: "/Audio/Items/Medical/ointment_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  - type: Stack
    stackType: HMESynthFleshPack
    count: 15 
  - type: StackPrice
    price: 200 

- type: entity
  id: HMESynthFleshPack1
  parent: HMESynthFleshPack
  suffix: Single
  components:
  - type: Stack
    stackType: HMESynthFleshPack
    count: 1

