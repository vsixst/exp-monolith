- type: entity
  id: DisciplinesDiskUssp
  parent: BaseItem
  name: technology disk (USSP)
  description: Disk with USSP technology.
  components:
  - type: DisciplinesDisk
    disciplines:
    - Ussp
    - UsspShipyard
    - UsspEquipment
    - UsspWeapons
  - type: Item
    size: Small
  - type: Sprite
    layers:
    - sprite: Objects/Misc/diskcases.rsi
      state: icon_base
    - sprite: Forge/Objects/Specific/Research/disciplinesdisk.rsi
      state: ussp
  - type: StaticPrice
    price: 5000
    vendPrice: 15000

