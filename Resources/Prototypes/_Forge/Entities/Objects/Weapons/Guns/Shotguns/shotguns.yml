- type: entity
  name: Отбойник
  parent: [BaseItem, ForgeBaseWeaponFrameShotgunWieldable, BaseC2Contraband]
  id: WeaponShotgunAD12
  description:  The Model 12 Automatic Shotgun is supplied in limited quantities to the DSBF forces by TechnicLogistic. The drum ammunition feeding system allows the weapon to develop a monstrous rate of fire and killing power.
  components:
  - type: Sprite
    sprite: Forge/Objects/Weapons/Guns/Shotguns/ad12.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Icon
    sprite: Forge/Objects/Weapons/Guns/Shotguns/ad12.rsi
    state: icon
  - type: Item
    size: Large
  - type: Clothing
    sprite: Forge/Objects/Weapons/Guns/Shotguns/ad12.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: AmmoCounter
  - type: GunRequiresWield
  - type: Gun
    fireRate: 1
    shotsPerBurst: 2
    burstCooldown: 1
    projectileSpeed: 35
    selectedMode: Burst
    availableModes:
    - Burst
    soundGunshot:
      path: /Audio/_Forge/Weapons/Guns/Gunshots/shotgun_auto.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: ForgeMagazineShotgunDrum
        priority: 2
        whitelist:
          tags:
          - MagazineShotgun
        whitelistFailPopup: gun-magazine-whitelist-fail
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineAmmoProvider
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 500
  - type: ClothingSpeedModifier
    walkModifier: 0.95
    sprintModifier: 0.95
  - type: PirateBountyItem
    id: FTechLogisticGuns

