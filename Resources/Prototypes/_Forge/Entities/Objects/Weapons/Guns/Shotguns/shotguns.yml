- type: entity
  name: PaxChry Defensie-12 (12 gauge)
  parent: [ ForgeBaseWeaponFrameShotgunWieldable ]
  suffix: Ренегаты
  id: WeaponShotgunDefensie
  description: A simple hunting shotgun equipped with a non-removable drum magazine, which makes it slightly uncomfortable to handle. In your case, you will be hunting a larger target. It can only be loaded manually, so don't forget to bring a bandolier.
  components:
  - type: Sprite
    sprite: Forge/Objects/Weapons/Guns/Shotguns/Defensie.rsi
  - type: Clothing
    sprite: Forge/Objects/Weapons/Guns/Shotguns/Defensie_inhands_64x.rsi
    slots:
    - Back
    - suitStorage
  - type: Item
    size: Large
    sprite: Forge/Objects/Weapons/Guns/Shotguns/Defensie_inhands_64x.rsi
    shape: # Goobstation
    - 0,0,4,1
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - ShellShotgun12_gaugeBuckshot
      - ShellShotgun12_gaugeLight
      - Cartridge
    mayTransfer: true
    proto: ShellShotgun12_gaugeBuckshot
    capacity: 12
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []
  - type: Gun
    fireRate: 2.5
    projectileSpeed: 45
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/shotgun.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: ItemTax # Mono
    taxAccounts:
      nfsd: 0.2
  - type: WieldedCrosshair
    rsi:
      sprite: _RMC14/Interface/MousePointer/pistol_mouse.rsi
      state: all
  - type: EmitSoundOnPickup
    sound:
      collection: RevolversPickUp
  - type: EmitSoundOnDrop
    sound:
      collection: RevolversDrop
  - type: EmitSoundOnLand
    sound:
      collection: RevolversDrop

#region Empire
- type: entity
  parent: [BaseWeaponCustomCell, BaseGunWieldable]
  id: WeaponEnergyShotgunKiller
  name: AE E-SG 'Killer'
  description: An energy weapon that fires shotgun-like spreads. The magazine serves as its battery.
  components:
  - type: Sprite
    sprite: Forge/Objects/Weapons/Guns/Shotguns/e_sg.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: energy-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: MagazineVisuals
    magState: energy
    steps: 5
    zeroVisible: true
  - type: Appearance
  - type: Clothing
    sprite: Forge/Objects/Weapons/Guns/Shotguns/e_sg_inhands.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Gun
    fireRate: 1
    angleIncrease: 3
    angleDecay: 28
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
  - type: Item
    size: Large
    shape:
    - 0,0,3,2
    sprite: Forge/Objects/Weapons/Guns/Shotguns/e_sg_inhands.rsi
  - type: GunRequiresWield
  - type: ItemSlots
    slots:
      gun_magazine:
        name: gun_magazine
        startingItem: MagazinePowerShotgun
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        whitelist:
          tags:
          - HEVPowerCellShotgun
  - type: BatterySlotRequiresToggle
    itemSlot: gun_magazine
