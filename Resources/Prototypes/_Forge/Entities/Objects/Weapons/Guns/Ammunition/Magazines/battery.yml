#region Empire

# Shotgun
- type: entity
  parent: BaseMilitaryPowerCell
  id: MagazinePowerShotgun
  name: shotgun power cell
  description: A power cell for energy shotguns that fires laser spreads.
  components:
  - type: Sprite
    sprite: Forge/Objects/Weapons/Guns/Ammunition/Magazine/energyshotgun.rsi
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: icon
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o3
      shader: unshaded
  - type: Item
    size: Small
  - type: ProjectileBatteryAmmoProvider
    proto: HEVBulletEnergyShotgunSpread
    fireCost: 200
  - type: Battery
    maxCharge: 1200
    startingCharge: 1200
  - type: Tag
    tags:
    - HEVPowerCellShotgun

