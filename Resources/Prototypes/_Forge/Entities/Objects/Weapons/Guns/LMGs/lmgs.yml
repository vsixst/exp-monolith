- type: entity
  name: L2RPK
  id: WeaponLightMachineGunL2RPK
  parent: [ForgeBaseWeaponLightMachineGunChamber20, BaseC2ContrabandUnredeemable ]
  description: The RPK-L2 is a heavy machine gun from the TechnicLogistic family, designed based on the well-known L6. This machine gun stands out for its increased accuracy and low production cost. However, its design features have made it very bulky.
  components:
  - type: Sprite
    sprite: Forge/Objects/Weapons/Guns/LMGs/L2RPK.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-3
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: Forge/Objects/Weapons/Guns/LMGs/L2RPK.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: Appearance
  - type: ClothingSpeedModifier
    walkModifier: 0.85
    sprintModifier: 0.85
  - type: Gun
    projectileSpeed: 33
    minAngle: 20
    maxAngle: 24
    angleIncrease: 3
    angleDecay: 14
    fireRate: 6.5
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.95
        Heat: 0.95
        Caustic: 0.95

#region Renegate
- type: entity
  name: NEK'o AR-400 (5.56x45mm)
  parent: [BaseWeaponLightMachineGun, BaseGunWieldable]
  suffix: Ренегаты
  id: WeaponLmgAR400
  description: This is likely a makeshift modified machine gun, given the lack of a bipod and the attached foregrip. Be careful when firing, and brace yourself for terrible recoil. Chambered in 5.56x45mm, accepts both box and standard magazines.
  components:
  - type: Item # Mono
    size: Huge
    sprite: Forge/Objects/Weapons/Guns/LMGs/ar400_inhands_32x.rsi
  - type: Sprite
    sprite: Forge/Objects/Weapons/Guns/LMGs/ar400.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: Forge/Objects/Weapons/Guns/LMGs/ar400_inhands_32x.rsi
  - type: ChamberMagazineAmmoProvider # Mono
    soundRack:
      path: /Audio/Weapons/Guns/Cock/lmg_cock.ogg
  - type: Gun
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/heavy_rifle_1.ogg # Mono
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: AmmoBox556x45mmBigFMJ # Mono
        insertSound: /Audio/Weapons/Guns/MagIn/lmg_magin.ogg # Mono
        ejectSound: /Audio/Weapons/Guns/MagOut/lmg_magout.ogg # Mono
        priority: 2
        whitelist:
          tags:
            - Magazine556x45mmFMJ # Mono
            - Magazine556x45mmBox # Mono
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge556x45mmFMJ # Mono
        priority: 1
        whitelist:
          tags:
            - Cartridge556x45mmFMJ # Mono
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: HeldSpeedModifier
  - type: ClothingSpeedModifier
    sprintModifier: 0.9
    walkModifier: 0.9
  - type: SpeedModifiedOnWield
    walkModifier: 0.4
    sprintModifier: 0.35
  - type: WieldDelay
    baseDelay: 2
    modifiedDelay: 2
    preventFiring: true
  - type: Appearance
  - type: StaticPrice # Mono
    price: 2000

