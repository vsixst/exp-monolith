- type: entity
  parent: [BaseStructureIndestructible, BaseComputerAiAccess]
  id: BaseComputerJobPreset
  abstract: true
  components:
  - type: JobPresetIdCardConsole
    rankPresets: []
    privilegedIdSlot:
      name: id-card-console-privileged-id
      ejectSound: /Audio/Machines/id_swipe.ogg
      insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
      ejectOnBreak: true
      swap: false
      whitelist:
        components:
        - IdCard
    targetIdSlot:
      name: id-card-console-target-id
      ejectSound: /Audio/Machines/id_swipe.ogg
      insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
      ejectOnBreak: true
      swap: false
      whitelist:
        components:
        - IdCard
  - type: ActivatableUI
    key: enum.JobPresetIdCardConsoleUiKey.Key
  - type: UserInterface
    interfaces:
      enum.JobPresetIdCardConsoleUiKey.Key:
        type: JobPresetConsoleBoundUserInterface
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#3c5eb5"
  - type: Tag
    tags:
    - AccessBreakerImmune
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      board: !type:Container
      JobPresetIdCardConsole-privilegedId: !type:ContainerSlot
      JobPresetIdCardConsole-targetId: !type:ContainerSlot
  - type: ShipRepairable
    repairTime: 4
    repairCost: 8

- type: entity
  parent: BaseComputerJobPreset
  id: ComputerTsfRank
  name: Консоль должностей ТСФ
  description: Терминал для назначения должностей ТС. Назначается не только должность, но и доступы! Бюрократия, храни Федерацию.
  components:
  - type: JobPresetIdCardConsole
    bodyImplants:
    - MindShieldImplant
    rankPresets:
    - TsfCommandingOfficer
    - TsfSeniorOfficer
    - TsfExecutiveOfficer
    - TsfAmbassador
    - TsfSeniorAide
    - TsfCrewOfficer
    - TsfSl
    - TsfMedic
    - TsfEngineer
    - TsfCrew
    - TsfRanger
    - TsfRecruit
  - type: Sprite
    sprite: Structures/Machines/computers.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      sprite: Forge/Structures/Machines/job_preset_screens.rsi
      state: tsf
    - map: ["computerLayerKeys"]
      state: id_key
    - map: ["enum.WiresVisualLayers.MaintenancePanel"]
      state: generic_panel_open
  - type: Computer
    board: TsfRankComputerCircuitboard

