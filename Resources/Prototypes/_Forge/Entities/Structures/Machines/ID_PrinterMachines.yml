- type: entity
  id: RenegateIDPrinter
  parent: FactionLathe
  name: renegate ID printer
  description: a printer that produces ID cards and Renegade encryption keys.
  suffix: Ренегаты
  components:
  - type: Sprite
    sprite: Structures/Machines/uniform_printer.rsi
    snapCardinals: false
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
  - type: Lathe
    idleState: icon
    runningState: icon
    staticPacks:
    - RenegateIDStatic
    - RenegateHeadsetStatic
    - Bureaucracytatic


