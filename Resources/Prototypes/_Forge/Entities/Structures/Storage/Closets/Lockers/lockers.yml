- type: entity
  id: ForgeLockerBaseSecure # RenegateLockerBaseSecure to ForgeLockerBaseSecure
  parent: LockerBaseSecure
  abstract: true
  components:
  - type: Sprite
    sprite: Forge/Structures/Storage/closet.rsi

