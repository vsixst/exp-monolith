- type: gameMap
  id: Frontier
  mapName: 'Центральный Аванпост'
  mapPath: /Maps/_Forge/Outpost/CentralOutpost.yml # Forge
  minPlayers: 0
  maxPlayers: 100
  randomRotation: false
  maxRandomOffset: 0
  stations:
    Frontier:
      stationProto: StandardFrontierStation
      gridComponents:
      - type: VesselMusic
        ambientMusicPrototype: ColossusCentralMusic
      - type: VesselInfo
        description: "Центр этого мира. Тут, наверное, безопасно."
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Центральный Аванпост'
#          nameGenerator:
#            !type:NanotrasenNameGenerator
#            prefixCreator: '14'
        - type: ExtraStationInformation
          icon: /Textures/Forge/Logo/Icon/banner_engineering.png # used the biggest one, looks better when downscaling than upscaling
          stationSubtext: 'frontier-lobby-frontier-subtext'
          stationDescription: 'frontier-lobby-frontier-description'
          lobbySortOrder: 1
        - type: StationJobs
          availableJobs:
            Contractor: [ -1, -1 ]
            Pilot: [ -1, -1 ]
            Mercenary: [ -1, -1 ]
            Borg: [ -1, -1 ]
            StationRepresentative: [ 1, 1 ]
            StationTrafficController: [ 2, 2 ]
            SecurityGuard: [ 3, 3 ]
            CCServiceWorker: [ 2, 2 ]
            NFJanitor: [ 2, 2 ]
            MailCarrier: [ 2, 2 ]
          tags:
          - HeadOfPersonnel
          - HeadOfSecurity
