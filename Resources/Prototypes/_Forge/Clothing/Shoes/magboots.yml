- type: entity
  parent: [ClothingShoesBootsMagBase, BaseJetpack, ClothingShoesBootsCombat, BaseC3Contraband, ContrabandClothing ]
  id: ClothingShoesBootsMagContractor
  name: DCN™ magboots
  description: Magnetic boots with a unique design, which appear to be based on an improved model, as they have a lighter magnetic attraction.
  components:
  - type: Sprite
    sprite: Forge/Clothing/Shoes/Boots/magboots-contractor.rsi
    state: icon
  - type: Clothing
    sprite: Forge/Clothing/Shoes/Boots/magboots-contractor.rsi
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 1
  - type: GasTank
    outputPressure: 42.6
    air:
      volume: 5
      temperature: 293.15
      moles:
      - 1.5
      - 1.5
  - type: Item
    sprite: null
    size: Small
    shape:
    - 0,0,1,1
  - type: Magboots
    magbootsAlert: MagbootsContractor
  - type: FootstepModifier
    footstepSoundCollection:
      collection: SilenceIsGolden

- type: alert
  id: MagbootsContractor
  icons:
  - sprite: Forge/Clothing/Shoes/Boots/magboots-contractor.rsi
    state: icon-on
  name: alerts-magboots-name
  description: alerts-magboots-desc

- type: entity
  parent: [ClothingShoesBootsMagSecurity, BaseC3Contraband]
  id: ClothingShoesBootsMagRenegade
  suffix: Ренегаты
  name: renegade magboots
  components:
  - type: Sprite
    sprite: Forge/Clothing/Shoes/Boots/magboots-renegade.rsi
    state: icon
  - type: Clothing
    sprite: Forge/Clothing/Shoes/Boots/magboots-renegade.rsi
  - type: Magboots
    magbootsAlert: MagbootsRenegade

- type: alert
  id: MagbootsRenegade
  icons:
  - sprite: Forge/Clothing/Shoes/Boots/magboots-renegade.rsi
    state: icon-on
  name: alerts-magboots-name
  description: alerts-magboots-desc

- type: entity
  parent: [ ClothingShoesBootsMagAdv, BaseFactionGearOtherFactionT2, BaseJetpack ]
  id: ClothingShoesBootsMagAsakimForge
  name: pre-fracture magboots
  description: State-of-the-art magnetic boots made for combat with advanced harnesses.
  components:
  - type: UnremovableClothing
  - type: Sprite
    sprite: Forge/Clothing/Shoes/Boots/advs_magboots_promax.rsi
    state: icon
  - type: Clothing
    sprite: Forge/Clothing/Shoes/Boots/advs_magboots_promax.rsi
    stripDelay: 120
    equipDelay: 120
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepHeavySuit
  - type: ClothingSlowOnDamageModifier
    modifier: 0.35
  - type: GasTank
    outputPressure: 1
    air:
      volume: 1000
      temperature: 1
      moles:
        - 100000 # oxygen
        - 100000 # nitrogen
  - type: Jetpack
    moleUsage: 0.000002
