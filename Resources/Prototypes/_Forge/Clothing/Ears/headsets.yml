- type: entity
  abstract: true
  parent: ClothingHeadsetAlt
  id: ClothingHeadsetAltLoudspeaker
  components:
  - type: Loudspeaker
    isActive: true
    canToggle: true
    affectRadio: true

# Синдикат
- type: entity
  parent: [ClothingHeadsetAlt, BaseC3SyndicateContraband, ContrabandClothing]
  id: ClothingHeadsetAltSyndicateSmuggler
  name: полноразмерная кроваво-красная гарнитура
  description: Модифицированный модульный интерком синдиката, надеваемый на голову, и содержащий ключ шифрования.
  suffix: Контрабандист
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeySmuggler
  - type: Sprite
    sprite: Clothing/Ears/Headsets/syndicate.rsi
  - type: Clothing
    sprite: Clothing/Ears/Headsets/syndicate.rsi

