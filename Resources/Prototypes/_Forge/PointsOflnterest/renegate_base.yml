- type: pointOfInterest
  id: RenegateFortress
  parent: [BasePOI, BaseRepairablePOI]
  name: 'Ренегатский Аванпост'
  minimumDistance: 7500
  maximumDistance: 9500
  spawnGamePreset: [ NFAdventure, NFPirate, MonoStandard, MonoRogueTSF, MonoRogueUSSP, MonoADS, MonoChimera, MonoMixed ]
  spawnGroup: Required
  gridPath: /Maps/_Forge/POI/renegates_base.yml
  addComponents:
  - type: IFF
    color: "#53377A"
    readOnly: true # mono

- type: gameMap
  id: RenegateFortress
  mapName: 'Ренегатский Аванпост'
  mapPath: /Maps/_Forge/POI/renegates_base.yml
  minPlayers: 0
  stations:
    RenegateFortress:
      stationProto: StandardFrontierOutpost
      gridComponents:
      - type: VesselInfo
        description: "Аванпост восставших колоний, Ренегаты "
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Ренегатский Аванпост'
        - type: ExtraStationInformation
          icon: /Textures/_NF/Interface/Pirate/piratelogo.png
          stationSubtext: 'frontier-lobby-renegate-subtext'
          stationDescription: 'frontier-lobby-renegate-description'
        - type: StationJobs
          availableJobs:
            Baron: [ 1, 1 ]
            Draftsman: [ 1, 1 ]
            Flunky: [ 5, 5 ]
            Foreman: [ 2, 2 ]
            Overseer: [ 1, 1]
            Quack: [ 2, 2 ]
        - type: StationDeadDropReporting
          messageSet: Pirate
        - type: StationDeadDropHintExempt
        - type: TradeCrateWildcardDestination
          valueMultiplier: 1.0 # Mono
