# Mono - modsuits cleanup - see #3733
- type: entity
  abstract: true
  parent: ClothingShoesBase
  id: ClothingModsuitBootsBase
  name: modsuit boots
  description: A special modular suit boots designed for compact folding inside modular suit control.
  categories: [ HideSpawnMenu ]
  components:
  - type: Appearance
  - type: Sprite
    sprite: _Goobstation/Clothing/Shoes/Modsuits/standard.rsi
    layers:
    - state: boots
    - state: boots-sealed
      map: [ "sealed" ]
  - type: Clothing
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
    slots: [ feet ]
  - type: Tag
    tags:
    - WhitelistChameleon
  - type: SealableClothing
    sealUpPopup: sealable-clothing-seal-up-boots
    sealDownPopup: sealable-clothing-seal-down-boots
  - type: ClothingSpeedModifier
    walkModifier: 0.95
    sprintModifier: 0.95
  - type: ItemToggle
    onUse: false
    onActivate: false
  - type: ToggleClothing
    action: ActionToggleMagboots
  - type: ComponentToggler
    components:
    - type: NoSlip
  - type: Magboots
    enabledPrefix: null
  - type: SealableClothingVisuals
    spriteLayer: sealed
    clothingVisuals:
      shoes:
      - state: equipped-FEET-sealed

- type: entity
  parent: ClothingModsuitBootsBase
  id: ClothingModsuitBootsStandard
