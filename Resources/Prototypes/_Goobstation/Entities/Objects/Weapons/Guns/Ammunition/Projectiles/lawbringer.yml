### Mono start

- type: entity
  id: BulletExplode
  name: explode
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Reflective
    reflective:
    - Energy
  - type: FlyBySound
    sound:
      collection: EnergyMiss
      params:
        volume: 5
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
    layers:
    - state: heavylaser
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Heat: 5
  - type: ExplodeOnTrigger
  - type: TriggerOnCollide
    fixtureID: projectile
  - type: Explosive
    explosionType: Default
    maxIntensity: 2
    intensitySlope: 0.8
    totalIntensity: 5
    tileBreakScale: 1
