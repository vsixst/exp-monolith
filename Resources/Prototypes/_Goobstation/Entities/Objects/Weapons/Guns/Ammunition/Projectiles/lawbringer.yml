- type: entity
  id: BulletPulse
  name: pulse
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Reflective
    reflective:
    - Energy
  - type: FlyBySound
    sound:
      collection: EnergyMiss
      params:
        volume: 5
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Projectiles/selectable_ammo.rsi
    layers:
    - state: omnilaser-blue
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Blunt: 10 # Mono 10 -> 40
  - type: ProjectileThrowOnHit
    distance: 3
    speed: 3
  - type: StaminaDamageOnCollide
    damage: 30 # Mono 10 -> 40

