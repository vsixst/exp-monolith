#region Random Spawners

- type: entity
  id: SpawnDroneBase
  parent: MarkerBase
  abstract: true
  components:
  - type: GridSpawner
    addComponents:
    - type: IFF
      flags: AlwaysShowColor
      color: "#9a2020"
    - type: GridCleanupGrid
      cleanupAcceleration: 3
      ignorePowered: true
      ignoreIFF: true
      ignorePrice: true
      distanceOverride: 1024 # so it doesn't despawn while in view
    - type: RandomMetadata
      nameSeparator: ""
      nameSegments:
      - DroneTitle
      - " 0x"
      - DroneHex
      - DroneHex
      - DroneHex
      - DroneHex
      - DroneHex
      - DroneHex
    nameGrid: false

- type: entity
  id: MonoDroneSpawnerT1
  parent: MarkerBase
  categories: [Spawner]
  components:
  - type: RandomSpawner
    prototypes:
    - SpawnDroneBasicSmall
    - SpawnDroneBasicMedium
    - SpawnDroneMPulsar
    - SpawnDroneLance

- type: entity
  id: MonoDroneSpawnerT2Inner
  parent: MarkerBase
  categories: [Spawner]
  components:
  - type: RandomSpawner
    prototypes:
    - SpawnDroneWasp
    - SpawnDroneCrown
    - SpawnDroneGust
    - SpawnDronePiercer

- type: entity
  id: MonoDroneSpawnerT2Middle
  parent: MarkerBase
  categories: [Spawner]
  components:
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: DroneSpawnTableT2Middle

- type: entity
  id: MonoDroneSpawnerT2Far
  parent: MarkerBase
  categories: [Spawner]
  components:
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: DroneSpawnTableT2Far

#endregion

#region Tables

- type: entityTable
  id: DroneTableT21
  table: !type:GroupSelector
    children:
    - id: SpawnDroneWasp
      weight: 10
    - id: SpawnDroneCrown
      weight: 10
    - id: SpawnDroneGust
      weight: 10
    - id: SpawnDronePiercer
      weight: 10

- type: entityTable
  id: DroneTableT22
  table: !type:GroupSelector
    children:
    - id: SpawnDroneMedusa
      weight: 10
    - id: SpawnDroneAssembly
      weight: 10
    - id: SpawnDroneBracket
      weight: 10

- type: entityTable
  id: DroneTableT23
  table: !type:GroupSelector
    children:
    - id: SpawnDroneMauler
      weight: 10

- type: entityTable
  id: DroneSpawnTableT2Middle
  table: !type:GroupSelector
    children:
    # T2 small
    - !type:NestedSelector
      tableId: DroneTableT21
      weight: 20
    # T2 medium
    - !type:NestedSelector
      tableId: DroneTableT22
      weight: 10

- type: entityTable
  id: DroneSpawnTableT2Far
  table: !type:GroupSelector
    children:
    # T2 medium
    - !type:NestedSelector
      tableId: DroneTableT22
      weight: 20
    # T2 large
    - !type:NestedSelector
      tableId: DroneTableT23
      weight: 10

#endregion

#region Debug

