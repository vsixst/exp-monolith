- type: entity
  id: WeaponTurretTovek
  name: ADMX-250 TOVEK Missile Pod
  parent: BallisticArtilleryCartridge
  description: A 250mm missile pod created by Aetherion Dynamics. Fires 250mm warheads to devastate enemy ships at long range. Can be remotely activated or linked to a GCS.
  components:
  - type: StaticPrice
    price: 10000
  - type: Sprite
    sprite: _Mono/Objects/ShuttleWeapons/tovek.rsi
    layers:
    - state: space_artillery
  - type: Appearance
  - type: FireControlRotate
  - type: AmmoCounter
  - type: WirelessNetworkConnection
    range: 500
  - type: GunSignalControl
  - type: Gun
    fireRate: 0.2
    recoil: 5
    shootThermalSignature: 8000000 # ~2828m
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/rocket_launcher.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/EmptyAlarm/smg_empty_alarm.ogg
  - type: SpaceArtillery
    powerChargeRate: 500
    powerUsePassive: 2500
    powerUseActive: 0
  - type: Actions
  - type: RadarBlip
    radarColor: "#035EFC"
    scale: 2
    visibleFromOtherGrids: true
  - type: BallisticAmmoProvider
    infiniteUnspawned: true
    whitelist:
      tags:
      - TovekCartridge
    capacity: 2
    proto: TovekCartridge
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
  - type: ShipGunType
    shipType: Missile
  - type: ShipGunClass
    shipClass: Medium
  - type: ShipRepairable
    repairTime: 35
    repairCost: 120
