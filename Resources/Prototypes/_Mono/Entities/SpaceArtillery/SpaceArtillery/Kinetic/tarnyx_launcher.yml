# inf ammo for ads/station

- type: entity
  id: WeaponTurretTarnyx
  name: ADBX-31 TARNYX 150mm EMP Cannon
  parent:
  - BallisticArtilleryUnanchorable
  - BallisticArtilleryTier3HP
  suffix: Station, Recharging Ammo, EMP
  description: A heavy EMP cannon made by Aetherion Dynamics, designed to disable large sections of enemy ships with a single, powerful shot. Effective in asymmetric combat. Can be remotely activated or linked up to a GCS.
  components:
  - type: StaticPrice
    price: 10000
  - type: Sprite
    sprite: _Mono/Objects/ShuttleWeapons/tarnyx.rsi
    layers:
    - state: space_artillery
  - type: Appearance
  - type: FireControlRotate
  - type: AmmoCounter
  - type: Battery
    maxCharge: 40000
    startingCharge: 40000
  - type: ExaminableBattery
  - type: WirelessNetworkConnection
    range: 500
  - type: GunSignalControl
  - type: Gun
    fireRate: 0.066
    projectileSpeed: 400
    shootThermalSignature: 8000000 # ~2.8km after firing - relatively low
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/ship_duster.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 214
  - type: SpaceArtillery
    powerChargeRate: 214
    powerUsePassive: 3500
    powerUseActive: 0
  - type: Actions
  - type: ProjectileBatteryAmmoProvider
    proto: ShipTarnyxProjectile
    fireCost: 150
  - type: RadarBlip
    radarColor: "#035EFC"
    scale: 2.5
    visibleFromOtherGrids: true
  - type: ShipGunType
    shipType: Energy
  - type: ShipGunClass
    shipClass: Heavy
  - type: ShipRepairable
    repairTime: 30
    repairCost: 100

