- type: entity
  parent: BaseThruster
  id: ThrusterLarge
  name: large thruster
  placement:
    mode: AlignTileAny
  components:
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 4500
      behaviors:
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-1.45,1.45,0.45"
        density: 1750
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: ApcPowerReceiver
    powerLoad: 10000
  - type: Thruster
    thrust: 800
    baseThrust: 800
    burnShape: ["-0.3,0.5","0.2,1.6","0.8,1.6","1.3,0.5"]
    damage:
      types:
        Heat: 120
  - type: Sprite
    sprite: _Mono/Structures/Shuttles/thruster_large.rsi
    offset: 0.5,-0.5
    layers:
    - state: base
      map: ["enum.ThrusterVisualLayers.Base"]
    - state: thrust
      map: ["enum.ThrusterVisualLayers.ThrustOn"]
      shader: unshaded
      visible: false
    - state: thrust_burn_unshaded
      map: ["enum.ThrusterVisualLayers.ThrustingUnshaded"]
      shader: unshaded
      visible: false
      offset: 0, 2
  - type: DeviceNetwork # Mono
    deviceNetId: Wireless # Mono
    receiveFrequencyId: BasicDevice # Mono
  - type: WirelessNetworkConnection # Mono
    range: 200 # Mono
  - type: DeviceLinkSink # Mono
    ports: # Mono
    - On # Mono
    - Off # Mono
    - Toggle # Mono
  - type: Anchorable
    flags: None
  - type: StaticPrice
    price: 1500
  - type: RadarBlip
    visibleFromOtherGrids: true
    radarColor: "#99FF99"
    scale: 2
    shape: diamond
    gridConfig:
      color: "#99FF99"
      shape: Square
      respectZoom: true
      rotate: true
      bounds: "-0.5,-1.5,1.5,0.5"
  - type: ShipRepairable
    repairTime: 15
    repairCost: 15
