- type: entity
  id: Battletable
  name: battle table
  parent: BaseStructure
  description: A futuristic-looking battle planning table.
  components:
  - type: Sprite
    sprite: _Mono/Structures/Furniture/Tables/battletable.rsi
    state: full
    noRot: true
  - type: Icon
    sprite: _Mono/Structures/Furniture/Tables/battletable.rsi
    state: full
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: PointLight
    color: "#7eaeca"
    radius: 1
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 125
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Animateable
  - type: PlaceableSurface
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 55
        mask: # tables should collide with other tables
        - TableMask
        layer:
        - TableLayer
        - BulletImpassable # Goobstation - Crawling
  - type: Climbable
  - type: Bonkable
    bonkDamage:
      types:
        Blunt: 4
  - type: Clickable
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepHull
  - type: Tag
    tags:
    - ForceFixRotations
  - type: RequireProjectileTarget # Goobstation - Crawling
    ignoreThrow: true
  # Mono
  - type: ShipRepairable
    repairTime: 1
    repairCost: 2
