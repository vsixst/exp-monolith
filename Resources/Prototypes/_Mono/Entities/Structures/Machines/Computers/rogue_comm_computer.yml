- type: entity
  parent: ComputerComms
  id: RogueComputerComms
  name: imperial vanguard communications computer
  description: The Imperial Vanguard's primary communications computer for issuing announcements.
  components:
  - type: Sprite
    sprite: _Mono/Structures/Machines/computers.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer_not_rot
    - map: ["computerLayerKeyboard"]
      state: gunnery_keyboard
    - map: ["computerLayerScreen"]
      state: comm_rogue
    - map: ["computerLayerKeys"]
      state: rogue_key
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: AccessReader
    access: [[ "Pirate" ]]
  - type: CommunicationsConsole
    title: comms-console-announcement-title-rogue
    color: "#D2B48C"
    canShuttle: false
    global: true #announce to everyone they're about to fuck shit up
    sound: /Audio/Announcements/announce.ogg
    canIncreaseAlertLevel: false
  - type: Computer
    board: RogueCommsComputerCircuitboard
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#D2B48C"
