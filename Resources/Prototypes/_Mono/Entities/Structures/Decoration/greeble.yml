- type: entity
  id: BaseGreeble
  abstract: true
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: Animateable
  - type: RequiresGrid
  - type: InteractionOutline
  - type: Tag
    tags:
    - Structure
  - type: Repairable #Mono: Nanite applicator
    qualities:
    - Applicating
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
  - type: ShipRepairable
    repairTime: 1
    repairCost: 0

- type: entity
  name: antenna
  description: Like antennas to hell. Usually part of a ship or station's UHF communication systems.
  id: GreebleAntenna1
  parent: BaseGreeble
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    offset: 0,2
    sprite: _Mono/Structures/Decoration/Greeble/antennae.rsi
    layers:
    - state: antenna1
    - state: antenna1_unshaded
      shader: unshaded
  - type: GridEdgeMarker
    begin: 0, -0.1
    end: 0, 1.5

- type: entity
  name: antenna
  description: Like antennas to hell. Usually part of a ship or station's UHF communication systems.
  id: GreebleAntenna2
  parent: BaseGreeble
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    offset: 0,2
    sprite: _Mono/Structures/Decoration/Greeble/antennae.rsi
    layers:
    - state: antenna2
    - state: antenna2_unshaded
      shader: unshaded
  - type: GridEdgeMarker
    begin: 0, -0.1
    end: 0, 1.2

- type: entity
  name: ELINT system
  description: Used for reading noncommunication electromagnetic radiation and their properties, such as radar signals. Who gives a shit?
  id: GreebleElint1
  parent: BaseGreeble
  placement:
    mode: SnapgridCenter
  components:
    - type: Sprite
      offset: 0,1
      sprite: _Mono/Structures/Decoration/Greeble/32x32.rsi
      layers:
        - state: elint1

- type: entity
  name: radar panel
  description: Some kind of protective fiberglass panelling. Seen in various systems, such as weather and altitude mapping to military early-warning systems. If it's powerful enough, you might get cancer a bit faster!
  id: GreebleRadarpanel1
  parent: BaseGreeble
  placement:
    mode: SnapgridCenter
  components:
    - type: Sprite
      offset: 0.5,0.5
      sprite: _Mono/Structures/Decoration/Greeble/64x64.rsi
      layers:
        - state: radarpanel1

- type: entity
  name: radar panel
  description: Some kind of protective fiberglass panelling. Seen in various systems, such as weather and altitude mapping to military early-warning systems. If it's powerful enough, you might get cancer a bit faster!
  id: GreebleRadarpanel2
  parent: BaseGreeble
  placement:
    mode: SnapgridCenter
  components:
    - type: Sprite
