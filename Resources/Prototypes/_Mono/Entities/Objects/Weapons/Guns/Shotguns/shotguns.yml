- type: entity
  name: UW12-B Helepolis (12 gauge)
  parent: BaseWeaponShotgun
  id: WeaponShotgunHelepolis
  description: The Union Wrightworks 12-gauge breaching model "Helepolis", a compact shotgun that sacrifices all combat ergonomics to better serve as a breaching tool. Breaks doors with slugs. Combat use unadvised.
  components:
  - type: Item
    size: Normal
    shape:
    - 0,0,1,0
    sprite: _Mono/Objects/Weapons/Guns/Shotguns/Helepolis.rsi
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Shotguns/Helepolis.rsi
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Shotguns/Helepolis.rsi
  - type: Gun
    minAngle: 3
    maxAngle: 12
    fireRate: 1.2
    angleIncrease: 4
    angleDecay: 4
  - type: Tag
    tags:
    - WeaponShotgunHelepolis
  - type: BallisticAmmoProvider
    autoCycle: false
    capacity: 4
    proto: ShellShotgun12_gaugeSlug
  - type: StaticPrice
    price: 600
    vendPrice: 3000

# PDV

- type: entity
  name: PD-VI "Sultan's Pulsar" shotgun (4 gauge)
  parent: [BaseWeaponShotgun, BaseGunWieldable, BaseC3SyndicateContraband]
  id: WeaponShotgunSultanPulsar
  description: A beast of a bolt-action shotgun, capable of firing the Sultan's finest 4-gauge with exceptional accuracy. Overkill for most space fauna, but using this means its certain you're hunting the most dangerous game.
  components:
  - type: Item
    size: Normal
    shape:
    - 0,0,5,0
    sprite: _Mono/Objects/Weapons/Guns/Shotguns/SultansPulsar_inhands_64x.rsi
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Shotguns/SultansPulsar.rsi
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Shotguns/SultansPulsar_inhands_64x.rsi
  - type: GunRequiresWield
  - type: Gun
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/bigshotgun_fire.ogg
    fireRate: 0.7
    selectedMode: Semiauto
    availableModes:
    - SemiAuto
  - type: GunSpreadModifier
    spread: 0.4
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - ShellShotgun23x75mmBuckshot
    capacity: 8
    proto: ShellShotgun23x75mmBuckshot
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/shotgun_insert.ogg
    autoCycle: false
  - type: StaticPrice
    price: 20000
    vendPrice: 20000
  - type: SpeedModifiedOnWield
    walkModifier: 0.8
    sprintModifier: 0.90
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 3
    pvsIncrease: 1
