- type: entity
  name: Big Leady (4 gauge)
  parent: [BaseWeaponShotgun, BaseGunWieldable]
  id: WeaponShotgunBigLeady
  description: A large 4 gauge (23x75mm) shotgun made to kill what any caliber below an autocannon cant.
  components: # intend for BigLeady to have tighter choke for slower fire rate and/or manual cycling
  - type: Item
    size: Normal
    shape:
    - 0,0,4,0
    sprite: _Mono/Objects/Weapons/Guns/Shotguns/BigLeady_inhands_64x.rsi # Frontier: add _Mono prefix
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Shotguns/BigLeady.rsi
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Shotguns/BigLeady.rsi
  - type: GunRequiresWield #remove when inaccuracy on spreads is fixed
  - type: Gun
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/bigshotgun_fire.ogg
    #fireRate: 1 # Goobstation
  - type: Tag
    tags:
    - WeaponShotgunBigLeady
  - type: BallisticAmmoProvider # Goobstation
    autoCycle: false
    whitelist:
      tags:
      - ShellShotgun23x75mmBuckshot
    capacity: 6
    proto: ShellShotgun23x75mmBuckshot
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/shotgun_insert.ogg
  - type: StaticPrice
    price: 5000
    vendPrice: 42300

- type: entity
  name: Big Johnny (4 gauge)
  parent: [BaseWeaponShotgun, BaseGunWieldable]
  id: WeaponShotgunBigJohnny
  description: A large 4 gauge (23x75mm) shotgun made to kill what any caliber below an autocannon cant. This one is outfitted with various tactical additions and is made for CQC at the cost of low ammo capacity.
  components: # intend for BigLeady to have tighter choke for slower fire rate and/or manual cycling
  - type: Item
    size: Normal
    shape:
    - 0,0,4,0
    sprite: _Mono/Objects/Weapons/Guns/Shotguns/BigJohnny_inhands_64x.rsi
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Shotguns/BigJohnny.rsi
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Shotguns/BigJohnny.rsi
  - type: GunRequiresWield #remove when inaccuracy on spreads is fixed
  - type: Gun
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/bigshotgun_fire.ogg
    #fireRate: 1 # Goobstation
  - type: GunSpreadModifier
    spread: 0.7
  - type: Tag
    tags:
    - WeaponShotgunBigLeady
  - type: BallisticAmmoProvider # Goobstation
    autoCycle: true
    whitelist:
      tags:
      - ShellShotgun23x75mmBuckshot
    capacity: 3
    proto: ShellShotgun23x75mmBuckshot
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/shotgun_insert.ogg
  - type: StaticPrice
    price: 5000
    vendPrice: 42300
  - type: LaserPointer
    targetedColor: "#FF0000"
    defaultColor: "#FF0000"
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 3
    pvsIncrease: 1

