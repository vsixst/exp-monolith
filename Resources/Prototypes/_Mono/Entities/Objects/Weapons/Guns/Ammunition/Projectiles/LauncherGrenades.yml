- type: entity
  name: explosive grenade
  description: Grenade that creates a small but devastating explosion.
  categories: [ HideSpawnMenu ]
  parent: ExGrenade
  id: ExGrenadeLaunched
  components:
  - type: TriggerOnSpawn
    timerOnly: true
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible # to not make large instant death explosions when firing multiple
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 800
      behaviors:
      - !type:TriggerBehavior
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  name: sticky bomb
