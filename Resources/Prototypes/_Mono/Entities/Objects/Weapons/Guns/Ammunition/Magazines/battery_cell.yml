# 400Thz

- type: entity
  id: LargePowerCell400Thz
  parent: BaseMilitaryPowerCell
  name: DEW-1R 400Thz battery box (large)
  description: A large and militarized power box for directed energy weapons. Tuned to fire low-frequency lasers with high capacity but low recharge speed. Vulnerable to EMP.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Power/tsfbattery.rsi
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: base
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o2
      shader: unshaded
      color: "#ff6e6e"
  - type: Item
    size: Normal
  - type: Battery
    maxCharge: 10000
    startingCharge: 10000
  - type: HitscanBatteryAmmoProvider
    proto: Hitscan400Thz
    fireCost: 50
  - type: Tag
    tags:
    - LargeMilitaryPowerCell

