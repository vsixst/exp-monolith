- type: entity
  name: spasaka ID card
  parent: [ IDCardStandard ] # Forge-Change-delete: BaseFactionGearPDVT2
  id: PDVSpasakaIDCard
  suffix: Chameleon
  components:
  - type: IdCard
    jobTitle: job-title-visitor
  - type: Access
    tags:
    - Maintenance
    - Mercenary
  - type: Sprite
    sprite: _Mono/Objects/Misc/id_cards.rsi
    layers:
    - state: base
    - state: id_rakhshan
  - type: AgentIDCard
  - type: ActivatableUI
    key: enum.AgentIDCardUiKey.Key
    inHandsOnly: true
  - type: Tag
    tags:
    - DoorBumpOpener
  - type: ChameleonClothing
    slot: [idcard]
    default: PDVRakhshanIDCard
    requireTag: WhitelistChameleonIdCard
  - type: UserInterface
    interfaces:
      enum.AgentIDCardUiKey.Key:
        type: AgentIDCardBoundUserInterface
      enum.ChameleonUiKey.Key:
        type: ChameleonBoundUserInterface
  - type: Contraband # Frontier — severity Restricted по умолчанию требует allowedDepartments/Jobs (ContrabandTest)
    severity: OtherFactionGear2
    hideValues: true
    turnInValues:
      FederationMilitaryCredit: 15
      Doubloon: 15
