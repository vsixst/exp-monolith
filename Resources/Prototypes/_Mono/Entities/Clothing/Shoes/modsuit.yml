# Gallóglach
- type: entity
  parent: ClothingModsuitBootsBase
  id: ClothingModsuitBootsMercenary
  name: mercenary modsuit boots
  description: The suits Actuator Enhancement System paired with the built in magboots make boarding actions a breeze.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Mono/Clothing/Shoes/Modsuits/mercenary.rsi
  - type: ClothingSpeedModifier
    walkModifier: 0.9 # Mono
    sprintModifier: 0.9 # Mono
  - type: JumpAbility
    jumpDistance: 4
    jumpSound: /Audio/Effects/Footsteps/suitstep2.ogg
  - type: ActionGrant
    actions:
    - ActionGravityJump
  - type: ItemActionGrant
    actions:
    - ActionGravityJump
    activeIfWorn: true
  - type: SealableClothingVisuals
    spriteLayer: sealed
    clothingVisuals:
      shoes:
      - state: equipped-FEET-sealed
      shoes-vox:
      - state: equipped-FEET-sealed-vox
