# Gallóglach

- type: entity
  parent: ClothingModsuitBase
  id: ClothingModsuitMercenary
  name: mercenary gallóglach hardsuit control unit
  description: A modular hardsuit control module unit equipped with enhanced actuators in the legs to allow for rapid assault or retreat actions.
  components:
  - type: Sprite
    sprite: _Mono/Clothing/Back/Modsuits/mercenary.rsi
  - type: Storage # Extra space - Mono
    grid:
    - 0,0,7,3
    maxItemSize: Huge
  - type: ToggleableClothing
    clothingPrototypes:
      head: ClothingModsuitHelmetGalloglass
      gloves: ClothingModsuitGauntletsMercenary
      outerClothing: ClothingModsuitChestplateMercenary
      shoes: ClothingModsuitBootsMercenary
  - type: ItemSlotsRequirePanel
    slots:
      cell_slot: true
  - type: PowerCellDraw
    drawRate: 0.1 # Sealed draw rate
    useRate: 0.5 # Draw rate for sealing
  - type: PowerCellSlot
    cellSlotId: cell_slot
    fitsInCharger: false
  - type: DoAfter
  - type: SealableClothingControl
  - type: SealableClothingRequiresPower
  - type: SealableClothingVisuals
    spriteLayer: sealed
    clothingVisuals:
      back:
      - state: equipped-BACKPACK-sealed
      back-resomi:
      - state: equipped-BACKPACK-sealed-resomi
  - type: Construction
    graph: Modsuit
    node: mercenary

