# Gallóglach
- type: entity
  parent: ClothingModsuitGauntletsBase
  id: ClothingModsuitGauntletsMercenary
  name: mercenary modsuit gauntlets
  description: The knuckle guards glow when you seal the suit...for no apparent reason. Doubles as literal Finger Guns chambered in .45, so they literally pack a punch and then some.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Mono/Clothing/Hands/Modsuits/mercenary.rsi
  - type: SealableClothingVisuals
    spriteLayer: sealed
    clothingVisuals:
      gloves:
      - state: equipped-HAND-sealed
      gloves-vox:
      - state: equipped-HAND-sealed-vox
      gloves-resomi:
      - state: equipped-HAND-sealed-resomi
  - type: Gun
    fireRate: 2
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/mateba.ogg
    projectileSpeed: 65 # Mono
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - Cartridge45_magnumFMJ
    capacity: 6
    proto: Cartridge45_magnumFMJ
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []
