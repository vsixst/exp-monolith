# Blunt and Slash
- type: entity
  parent: BaseItem
  id: ArmorPlateBlunt_Slash
  name: blunt/slash armor plate
  description: An armor module consisting of additional protective plasteel plating and shock absorbant plastic. Protects against blunt force and slash attacks. Vulnerable to heat.
  components:
  - type: Sprite
    sprite: _Mono/Clothing/ArmorPlate/armor_plates.rsi
    state: blunt_slash
  - type: Item
    sprite: _Mono/Clothing/ArmorPlate/armor_plates.rsi
    size: Normal
  - type: ArmorPlateItem
    maxDurability: 50
    walkSpeedModifier: 0.95
    sprintSpeedModifier: 0.95
    staminaDamageMultiplier: 1.0
    absorptionRatios:
      Blunt: 0.7
      Slash: 0.7
      Burn: 1.2
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

