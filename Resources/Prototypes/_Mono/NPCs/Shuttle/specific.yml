- type: utilityQuery
  id: NearbyShuttleTargetsLongRange
  parent: NearbyShuttleTargets
  query:
  - !type:NearbyNpcTargetsQuery
    range: 4000

- type: htnCompound
  id: AttackerShuttleSmartStaticCompound
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargets
    - !type:HTNCompoundTask
      task: ShuttleAttackSmartStaticCompound

- type: htnCompound
  id: ShuttleAttackSmartStaticCompound
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: TargetCoordinates
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: PlanFinished
        removeKeyOnFinish: false
        alwaysFaceTarget: true
        inRangeMaxSpeed: 4
        avoidProjectiles: true
        range: 750
        rangeTolerance: 150
        targetKey: TargetCoordinates
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.6 # knows how to aim
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargets
        key: Target
        coordinatesKey: TargetCoordinates

- type: htnCompound
  id: DroneCompoundAssembly
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargetsLongRange
    - !type:HTNCompoundTask
      task: ShuttleAttackDroneCompoundAssembly

- type: htnCompound
  id: ShuttleAttackDroneCompoundAssembly
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: TargetCoordinates
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: PlanFinished
        alwaysFaceTarget: true
        targetRotation: 90
        removeKeyOnFinish: false
        inRangeMaxSpeed: 20
        range: 200
        rangeTolerance: 20
        targetKey: TargetCoordinates
        mode: OrbitCW
        orbitOffset: 5 # slow orbit
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.2
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargetsLongRange
        key: Target
        coordinatesKey: TargetCoordinates

- type: htnCompound
  id: ApproacherShuttleCompoundDodger
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargets
    - !type:HTNCompoundTask
      task: ShuttleApproachCompoundDodger

- type: htnCompound
  id: ShuttleApproachCompoundDodger
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: TargetCoordinates
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: TaskFinished
        avoidProjectiles: true
        removeKeyOnFinish: false
        inRangeMaxSpeed: 0.1
        range: 700
        rangeTolerance: 0
        alwaysFaceTarget: true
        evasionSectorDepth: 5
        evasionSectorCount: 36
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargets
        key: Target
        coordinatesKey: TargetCoordinates
