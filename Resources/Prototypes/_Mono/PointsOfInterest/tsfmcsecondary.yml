- type: pointOfInterest
  id: TSFMCOutpost
  parent: [BasePOI, BaseRepairablePOI]
  name: 'Вторичный аванпост ТСФ'
  minimumDistance: 11000
  maximumDistance: 14000
  spawnGamePreset: [ NFAdventure, NFPirate, MonoStandard, MonoRogueTSF, MonoTSFUSSP, MonoADS, MonoChimera, MonoMixed ]
  spawnGroup: Required
  gridPath: /Maps/_Mono/POI/tsfmcoutpost.yml
  addComponents:
  - type: IFF
    color: "#047abd"
    flags: [HideLabel]
    readOnly: true # mono

- type: gameMap
  id: TSFMCOutpost
  mapName: 'Вторичный аванпост ТСФ'
  mapPath: /Maps/_Mono/POI/tsfmcoutpost.yml
  minPlayers: 0
  stations:
    TSFMCOutpost:
      stationProto: SecurityFrontierOutpost
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Вторичный аванпост ТСФ'
        - type: ExtraStationInformation
          icon:
            sprite: _NF/Structures/Decoration/banner.rsi
            state: nfsd-banner
          stationSubtext: 'frontier-lobby-tsfmc-secondary-subtext'
          stationDescription: 'frontier-lobby-tsfmc-secondary-description'
          lobbySortOrder: 2
        - type: StationJobs
          availableJobs:
            #Forge Change
            TsfSeniorAide: [ 0, 1 ]
            TsfRanger: [ -1, -1 ]
            TsfRecruit: [ -1, -1 ]
          tags:
          - HeadOfPersonnel
          - HeadOfSecurity
        - type: StationDeadDropHintExempt
