- type: pointOfInterest
  id: TSFMCHalcyon
  parent: [BasePOI, BaseRepairablePOI]
  name: 'Флагман ДСБФ «Халкион»'
  minimumDistance: 4500 # Mono
  maximumDistance: 5500 # Mono
  spawnGamePreset: [ NFAdventure, NFPirate, MonoStandard, MonoRogueTSF, MonoTSFUSSP, MonoADS, MonoChimera, MonoMixed, MonoAllAtOnce ]
  spawnGroup: Required
  gridPath: /Maps/_Mono/POI/tsfmchalcyon.yml
  addComponents:
  - type: IFF
    color: "#047abd"
    readOnly: true
  - type: SolarPoweredGrid
    doNotCull: true

- type: gameMap
  id: TSFMCHalcyon
  mapName: 'Флагман ТСФ «Халкион»'
  mapPath: /Maps/_Mono/POI/tsfmchalcyon.yml
  minPlayers: 0
  randomRotation: false
  stations:
    TSFMCHalcyon:
      stationProto: SecurityFrontierOutpost
      gridComponents:
      - type: VesselInfo
        description: "Законсервированный линкор, переделанный в передовую базу, — штаб операций ТСФ."
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Флагман ТСФ «Халкион»'
        - type: ExtraStationInformation
          icon:
            sprite: _NF/Structures/Decoration/banner.rsi
            state: nfsd-banner
          stationSubtext: 'frontier-lobby-nfsd-subtext'
          stationDescription: 'frontier-lobby-nfsd-description'
          lobbySortOrder: 2
        - type: StationJobs
          availableJobs:
            #Forge Change
            TsfCommandingOfficer: [ 1, 1 ]
            TsfExecutiveOfficer: [ 1, 1 ]
            TsfSeniorOfficer: [ 1, 1 ]
            TsfSeniorAide: [ 1, 1 ]
            TsfAmbassador: [ 1, 1 ]
            TsfRanger: [ -1, -1 ]
            TsfRecruit: [ -1, -1 ]
            TsfEngineer: [ 2, 2 ]
          tags:
          - HeadOfPersonnel
          - HeadOfSecurity
        - type: StationDeadDropReporting
          messageSet: Nfsd
        - type: StationDeadDropHintExempt
