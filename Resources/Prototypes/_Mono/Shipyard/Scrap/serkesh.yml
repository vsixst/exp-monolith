  name: RSC-Serkesh
  description: Iron handed heavy hitter of RedSail Corsairs, not the biggest, not the baddest and most definitely not the fastest. Put together on the backwater ports of the galaxy with half burned and half-missing andromeda blueprints, if andromeda is the lovechild of an artist and a surgeon. The RSC-Serkesh is the abandoned kid of a butcher and a hitman, she is not pretty, doesn't do any tricks, but she gets the job done. Armed with heavy ballistic weapons, it's a heavily armored bruiser that can exchange blows with any ship from short to medium range.
