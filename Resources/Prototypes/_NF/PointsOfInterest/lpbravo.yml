# Notes:
# just a little loot n shoot POI. Pretty much the second POI to even exist
- type: pointOfInterest
  id: LPBravo
  parent: BasePOI
  name: 'Пункт наблюдения «Браво»'
  minimumDistance: 12000
  maximumDistance: 15000 # Forge-change
  spawnGroup: SyndicateFOB
  gridPath: /Maps/_NF/POI/lpbravo.yml
  hideWarp: true
  addComponents:
  - type: IFF
    color: "#C83737"
    flags: [HideLabel]
    readOnly: false
  - type: SyndicateFOB # For pinpointer
  - type: SolarPoweredGrid
    trackOnInit: true
    doNotCull: true

- type: gameMap
  id: LPBravo
  mapName: 'Пункт наблюдения «Браво»'
  mapPath: /Maps/_NF/POI/lpbravo.yml
  minPlayers: 0
  stations:
    LPBravo:
      # FIXME: no records despite shipyard console, could currently be gamed
      stationProto: StandardFrontierOutpost
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Пункт наблюдения «Браво»'
        - type: StationJobs
          availableJobs: {}
        - type: StationDeadDropHintExempt
