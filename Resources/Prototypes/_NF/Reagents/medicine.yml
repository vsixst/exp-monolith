- type: reagent
  id : Traumoxadone
  name: reagent-name-traumoxadone
  group: Medicine
  desc: reagent-desc-traumoxadone
  physicalDesc: reagent-physical-desc-soothing
  flavor: medicine
  color: "#880077"
  worksOnTheDead: true
  metabolisms:
    Cryogenic:
      effects:
      - !type:EvenHealthChange #Mono: EvenHealthChange
        conditions:
        - !type:Temperature
          max: 213.0
        damage:
          Brute: -10
#          types: #Mono start: RR reversal buff and evenheal effect
#            Blunt: -2
#            Piercing: -2
#            Slash: -2
      - !type:HealthScaleEffect
        conditions:
        - !type:Temperature
          max: 213.0
        - !type:TotalDamage
          min: 200
        healthScale:
          types:
            Blunt: 0.98
            Slash: 0.98
            Piercing: 0.98 #Mono end
      - !type:GenericStatusEffect # Mono edit
        conditions:
        - !type:OrganType
          type: Hydrakin
        - !type:Temperature
          max: 213.0
        key: ForcedSleep
        component: ForcedSleeping
        refresh: false
        type: Add

