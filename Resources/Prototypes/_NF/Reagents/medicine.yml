#impstation
- type: reagent
  id: Caramexinin
  name: reagent-name-caramexinin
  desc: reagent-desc-caramexinin
  physicalDesc: reagent-physical-desc-grainy
  flavor: sweet
  color: "#bdfff3"
  recognizable: true
  metabolisms:
    Medicine:
      metabolismRate: 0.1 #this should metabolise in the same amount of time as a drink in a 5:1 mix
      effects:
      - !type:AdjustReagent
        reagent: Theobromine
        amount: -0.25
