    - type: Paper
      content: >-
        дравия, товарищ.

        Я Алекс№@##р Кулакс№"o№.

        Звание: №№@##.

        Я служу великому СССП, и если ты читаешь это значит время пришло. Революция уже не просто слова, она грядёт, она приближается с каждым днём. Слишком долго нас держали в цепях, слишком долго мы терпели и молчали.

        Вставайте с колен, товарищи. Идите вместе с рабочими, с теми, кто строит, кто держит на своих плечах весь этот мир. Объединяйтесь, не бойтесь, не отступайте. Только вместе мы сможем изменить всё и вырвать своё будущее из чужих рук.

        Помни, ты не один. Нас много. И мы идём.

        Славься великий СССП!
