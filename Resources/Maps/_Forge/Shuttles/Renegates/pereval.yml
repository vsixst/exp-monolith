- proto: Paper
  entities:
  - uid: 1024
    components:
    - type: Transform
      pos: -2.4861171,21.610094
      parent: 1
    - type: Paper
      content: >-
        Bin$#:

        Работаем, работаем!! Ребята, у нас сроки! Это Дисатное судно должно быть готово уже завтра!!!


        №№@####@ #@###@##:

        Ш-ш-с… Босс… Зачем мы заделываем… Бочку пива в отсеке высадки?!


        Са#№:

        Тебя ебать не должно. Работай, давай. Или оставлю без премии.


        #$### @###:

        Вопрос тот же… Зачем?.. Мы реально заделываем бочку пива в десантном отсеке… Это нормально?


        Bin$#:

        Почему вы ещё не сделали то, что попросил Са№я?? Время тикает!!


        №№@####@ #@###@##:

        Босс… бочка тяжёлая, люк еле закрывается…


        Са#№:

        Не оправдания! Берём кувалду, забиваем, и вперед! Кто не успеет - без премии.


        #$### @###:

        А если она потом взорвётся? Там же давление…

        (нервно смеётся) Ладно, делаем…


        Bin$#:

        Да хватит ныть! Я видел, как вы вчера сами пиво пили вместо работы!


        №№@####@ #@###@##:

        Эээ… мы думали, это — бонуссс…


        Са#№:

        Бонус?! Ваши головы будут бонусом, если не заделаете!


        Bin$#:

        Запись диктофона включена. Всё фиксируем.

        Пошли, ребята, последний рывок! Завтра судно идёт в боевой рейс, и нам плевать, что там бочки с пивом!


        №№@####@ #@###@##:

        (шепотом) Если оно взорвётся… я ухожу на пенсию…


        #$### @###:

        Да ладно, оно просто стоит… пока мы идём, босс, вроде нормально…


        Са#№:

        Нормально?! Это десантное судно, с него будут делать высадку, а вы тут пиво прячете как дети!

        Бери кувалду, №№@####@, и не останавливайся!


        Bin$#:

        Я не шучу. Завтра вылет. Всё или ничего.


        №№@####@ #@###@##:

        (тихо) А если мы случайно перепутаем бочку… с пивом и с топливом…


        Са#№:

        Ты умрёшь раньше, чем судно стартует! Да пошли, работаем!


        Запись диктофона... №-122....
