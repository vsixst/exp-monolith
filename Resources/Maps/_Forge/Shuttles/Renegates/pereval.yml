      desc: Пепельница лежит на полу, обычная стеклянная, чуть поцарапанная. Вокруг неё россыпь окурков, серый пепел, запах табака въелся в воздух и чувствуется сразу. Но внутри пусто, ни пепла, ни следов, будто в неё никто никогда не стряхивал сигарету. И вот это странно. Если здесь курили так много, почему не в неё. Если она лежит рядом, зачем бросали всё мимо. Её уронили или специально оставили так, чтобы выглядело как случайность. Мелочь вроде бы, а ощущение неприятное, и вопросов становится только больше.
